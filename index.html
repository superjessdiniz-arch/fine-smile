<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ファインスマイル / Fine Smile</title>
    <!-- Supabaseをグローバルに読み込みます -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* (デザインはそのまま) */
        :root { --ios-bg: #f2f2f7; --ios-blue: #007aff; --ios-red: #ff3b30; }
        body { background-color: var(--ios-bg); font-family: sans-serif; display: flex; justify-content: center; min-height: 100vh; margin: 0; }
        .phone-frame { width: 100%; max-width: 430px; background: white; min-height: 100vh; padding: 20px; }
        .screen { display: none; }
        .active { display: flex; flex-direction: column; }
        .btn-primary { background: var(--ios-blue); color: white; padding: 15px; border-radius: 10px; border: none; cursor: pointer; }
        .input-field { padding: 10px; border: 1px solid #ccc; border-radius: 8px; margin-bottom: 10px; width: 100%; }
    </style>
</head>
<body>

<div class="phone-frame">
    <!-- ログイン画面 -->
    <div class="screen active" id="loginScreen">
        <h1>ファインスマイル</h1>
        <input type="email" id="emailInput" class="input-field" placeholder="メールアドレス">
        <input type="password" id="passwordInput" class="input-field" placeholder="パスワード">
        <input type="text" id="nameInput" class="input-field" placeholder="名前" style="display:none;">
        <button id="mainSubmitBtn" class="btn-primary">ログイン</button>
        <p id="toggleAuthLink" style="cursor:pointer; color:blue;">アカウント作成はこちら</p>
    </div>

    <!-- カレンダー画面 -->
    <div class="screen" id="calendarScreen">
        <h1>カレンダー</h1>
        <button id="logoutBtn" class="btn-primary" style="background:var(--ios-red);">ログアウト</button>
    </div>
</div>

<script>
    // Supabaseの設定
    const SUPABASE_URL = "https://xzgctiomfdhbmadmqvtm.supabase.co"; 
    const SUPABASE_ANON_KEY = "sb_publishable_5T2YaTeA1jhv_ofatSeSwQ_xq6tAqsI";
    let supabase = null;

    // 初期化
    window.onload = function() {
        if (window.supabase) {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            console.log("Supabase接続成功");
        } else {
            console.error("Supabaseが読み込めていません");
        }

        // イベントリスナーを確実に設定
        document.getElementById('mainSubmitBtn').addEventListener('click', submitAuthForm);
        document.getElementById('toggleAuthLink').addEventListener('click', toggleAuthMode);
        document.getElementById('logoutBtn').addEventListener('click', logout);
    };

    let authMode = 'login';

    function toggleAuthMode() {
        authMode = authMode === 'login' ? 'register' : 'login';
        document.getElementById('nameInput').style.display = authMode === 'register' ? 'block' : 'none';
        document.getElementById('mainSubmitBtn').innerText = authMode === 'register' ? 'アカウント作成' : 'ログイン';
    }

    async function submitAuthForm() {
        const email = document.getElementById('emailInput').value;
        const password = document.getElementById('passwordInput').value;
        const name = document.getElementById('nameInput').value;

        if (!supabase) {
            alert("エラー: Supabaseに接続されていません。");
            return;
        }

        if (authMode === 'register') {
            const { error } = await supabase.auth.signUp({ email, password, options: { data: { full_name: name } } });
            if (error) alert("エラー: " + error.message); else alert("登録完了！ログインしてください。");
        } else {
            const { data, error } = await supabase.auth.signInWithPassword({ email, password });
            if (error) alert("エラー: " + error.message); else {
                document.getElementById('loginScreen').classList.remove('active');
                document.getElementById('calendarScreen').classList.add('active');
            }
        }
    }

    function logout() { location.reload(); }
</script>
</body>
</html>

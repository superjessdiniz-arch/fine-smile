<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ファインスマイル勤務カレンダー / Fine Smile</title>
    <style>
        :root {
            --ios-bg: #f2f2f7;
            --ios-card: #ffffff;
            --ios-blue: #007aff;
            --ios-green: #34c759;
            --ios-red: #ff3b30;
            --ios-red-light: #ffebe9;
            --ios-grey: #8e8e93;
            --ios-border: #e5e5ea;
            --sunday: #ff3b30;
            --saturday: #007aff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Helvetica Neue", Arial, sans-serif; }
        body { background-color: #d1d1d6; color: #000000; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
        .phone-frame { width: 100%; max-width: 430px; background-color: var(--ios-bg); min-height: 100vh; display: flex; flex-direction: column; position: relative; box-shadow: 0 0 30px rgba(0,0,0,0.15); }
        .demo-banner { background-color: #ff9500; color: white; text-align: center; font-size: 0.75rem; font-weight: bold; padding: 4px 0; z-index: 11; display: none; }
        .app-header { background-color: rgba(255, 255, 255, 0.85); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); padding: 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--ios-border); position: sticky; top: 0; z-index: 5; }
        .header-left { font-size: 1.3rem; font-weight: 800; letter-spacing: -0.5px; }
        .header-right { display: flex; align-items: center; gap: 12px; }
        .user-name { font-size: 0.9rem; font-weight: 600; }
        .role-badge { font-size: 0.7rem; font-weight: 700; padding: 3px 8px; border-radius: 100px; background-color: #e5e5ea; color: #3a3a3c; }
        .role-badge.staff { background-color: #e5e5ea; color: #8e8e93; }
        .delete-account-btn { background: none; border: none; color: var(--ios-grey); font-size: 1.1rem; cursor: pointer; padding: 4px; }
        .logout-icon { color: var(--ios-red); font-size: 1.2rem; cursor: pointer; background: none; border: none; padding: 4px; }
        .screen { display: none; flex-direction: column; padding: 16px; gap: 16px; flex-grow: 1; }
        .screen.active { display: flex; }
        .login-wrapper { display: flex; flex-direction: column; align-items: center; justify-content: center; flex-grow: 1; padding: 20px; }
        .logo-box { width: 80px; height: 80px; background-color: var(--ios-blue); border-radius: 22px; display: flex; align-items: center; justify-content: center; color: white; font-size: 2rem; font-weight: 800; margin-bottom: 16px; box-shadow: 0 8px 16px rgba(0,122,255,0.25); }
        .login-brand-title { font-size: 1.8rem; font-weight: 800; text-align: center; letter-spacing: -0.5px; }
        .login-brand-sub { font-size: 1rem; color: var(--ios-grey); text-align: center; margin-bottom: 30px; }
        .login-card { background-color: var(--ios-card); border-radius: 24px; padding: 24px; width: 100%; display: flex; flex-direction: column; gap: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        .login-card h3 { font-size: 1.4rem; font-weight: 700; text-align: center; margin-bottom: 8px; }
        .input-group { display: flex; flex-direction: column; gap: 6px; }
        .input-group label { font-size: 0.8rem; font-weight: 600; color: var(--ios-grey); padding-left: 4px; }
        .input-field { background-color: #e5e5ea; border: 2px solid transparent; padding: 14px; border-radius: 14px; font-size: 1rem; outline: none; transition: all 0.2s; }
        .input-field:focus { background-color: #ffffff; border-color: #8ebbff; }
        .btn-primary { background-color: var(--ios-blue); color: white; border: none; padding: 14px; border-radius: 14px; font-size: 1rem; font-weight: 700; cursor: pointer; }
        .login-toggle-link { font-size: 0.85rem; color: var(--ios-grey); text-align: center; margin-top: 24px; cursor: pointer; }
        .login-toggle-link span { color: var(--ios-blue); font-weight: 600; }
        .calendar-nav-card { background-color: var(--ios-card); padding: 12px 16px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 8px rgba(0,0,0,0.02); }
        .nav-btn { background-color: #f2f2f7; border: none; width: 36px; height: 36px; border-radius: 10px; color: var(--ios-blue); font-weight: bold; cursor: pointer; }
        .current-month-year { font-size: 1.15rem; font-weight: 700; }
        .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 1px; background-color: var(--ios-border); border-radius: 16px; overflow: hidden; }
        .grid-header { background-color: var(--ios-card); text-align: center; font-size: 0.75rem; font-weight: 700; padding: 12px 0; color: var(--ios-grey); }
        .grid-day { background-color: var(--ios-card); min-height: 85px; padding: 6px; display: flex; flex-direction: column; gap: 4px; cursor: pointer; }
        .grid-day.inactive { background-color: #fafafc; opacity: 0.4; }
        .day-num { font-size: 0.85rem; font-weight: 700; }
        .badges-list { display: flex; flex-direction: column; gap: 2px; overflow: hidden; max-height: 52px; }
        .badge-pill { background-color: var(--ios-red-light); color: var(--ios-red); font-size: 0.65rem; font-weight: 700; padding: 2px 4px; border-radius: 4px; }
        .modal-bg { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.4); z-index: 10; justify-content: center; align-items: flex-end; }
        .modal-bg.active { display: flex; }
        .bottom-sheet { background-color: var(--ios-card); width: 100%; border-radius: 20px 20px 0 0; padding: 24px 20px 40px 20px; display: flex; flex-direction: column; gap: 16px; }
        .action-btn { width: 100%; padding: 16px; font-size: 1rem; font-weight: 700; border: none; border-radius: 14px; cursor: pointer; }
        .action-btn.add { background-color: var(--ios-red); color: white; }
        .action-btn.remove { background-color: var(--ios-grey); color: white; }
        .tab-bar { background-color: rgba(255, 255, 255, 0.9); backdrop-filter: blur(20px); border-top: 1px solid var(--ios-border); display: flex; padding-bottom: 24px; }
        .tab-item { flex: 1; padding: 10px; text-align: center; font-size: 0.75rem; font-weight: 600; color: var(--ios-grey); cursor: pointer; display: flex; flex-direction: column; align-items: center; }
    </style>
</head>
<body>

<div class="phone-frame">
    <div class="demo-banner" id="demoBanner"></div>

    <div class="app-header" id="appHeader" style="display: none;">
        <span class="header-left" id="headerTitle">ファインスマイル</span>
        <div class="header-right">
            <span class="user-name" id="userNameLabel"></span>
            <span class="role-badge" id="userRoleLabel"></span>
            <button class="delete-account-btn" onclick="showDeleteConfirm()" id="deleteAccountBtn">🗑️</button>
            <button class="logout-icon" onclick="logout()">➔</button>
        </div>
    </div>

    <div class="screen active" id="loginScreen">
        <div class="login-wrapper">
            <div class="logo-box">FS</div>
            <h1 class="login-brand-title" id="brandTitle">ファインスマイル</h1>
            <p class="login-brand-sub" id="brandSub">勤務カレンダー</p>
            <div class="login-card">
                <h3 id="formTitle">ログイン</h3>
                <div class="input-group">
                    <label id="emailLabel">メールアドレス</label>
                    <input type="email" class="input-field" id="emailInput">
                </div>
                <div class="input-group" id="passwordGroup">
                    <label id="passLabel">パスワード</label>
                    <input type="password" class="input-field" id="passwordInput">
                </div>
                <div class="input-group" id="nameGroup" style="display: none;">
                    <label id="nameLabel">お名前</label>
                    <input type="text" class="input-field" id="nameInput">
                </div>
                <button class="btn-primary" id="mainSubmitBtn" onclick="submitAuthForm()">ログイン</button>
            </div>
            <p class="login-toggle-link" id="toggleAuthLink" onclick="toggleAuthMode()"></p>
        </div>
    </div>

    <div class="screen" id="calendarScreen">
        <div class="calendar-nav-card">
            <button class="nav-btn" onclick="adjustMonth(-1)">◀</button>
            <span class="current-month-year" id="monthLabel"></span>
            <button class="nav-btn" onclick="adjustMonth(1)">▶</button>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <div class="tab-bar" id="appTabBar" style="display: none;">
        <div class="tab-item active"><span id="tabCalendarLabel">カレンダー</span></div>
    </div>

    <div class="modal-bg" id="detailModal" onclick="closeDetailModal()">
        <div class="bottom-sheet" onclick="event.stopPropagation()">
            <span id="modalDateTitle"></span>
            <div id="modalStaffList"></div>
            <button class="action-btn" id="modalActionBtn" onclick="toggleMyUnavailability()">アクション</button>
        </div>
    </div>
</div>

<script type="module">
    const SUPABASE_URL = "https://xzgctiomfdhbmadmqvtm.supabase.co"; 
    const SUPABASE_ANON_KEY = "sb_publishable_5T2YaTeA1jhv_ofatSeSwQ_xq6tAqsI";

    let supabase = null;
    let isSupabaseEnabled = false;
    let authMode = 'login';
    let sessionUser = null;
    let focusDate = new Date();
    let activeDateStr = "";
    
    // Traduções básicas
    const t = navigator.language.startsWith('pt') ? { 
        login: "Entrar", register: "Criar Conta", title: "Fine Smile", 
        email: "E-mail", pass: "Senha", name: "Nome", btn: "Entrar", toggle: "Não tem conta? <span>Criar</span>" 
    } : { 
        login: "ログイン", register: "アカウント作成", title: "ファインスマイル", 
        email: "メール", pass: "パスワード", name: "名前", btn: "ログイン", toggle: "アカウントがない？ <span>作成</span>" 
    };

    window.onload = async function() {
        // Inicializa Supabase via importação dinâmica segura
        try {
            const { createClient } = await import('https://esm.sh/@supabase/supabase-js@2');
            supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            isSupabaseEnabled = true;
        } catch(e) {
            console.log("Modo Offline/Local");
        }
        applyUI();
    };

    function applyUI() {
        document.getElementById('brandTitle').innerText = t.title;
        document.getElementById('emailLabel').innerText = t.email;
        document.getElementById('passLabel').innerText = t.pass;
        document.getElementById('toggleAuthLink').innerHTML = t.toggle;
    }

    function toggleAuthMode() {
        authMode = authMode === 'login' ? 'register' : 'login';
        document.getElementById('nameGroup').style.display = authMode === 'register' ? 'flex' : 'none';
        document.getElementById('mainSubmitBtn').innerText = authMode === 'register' ? t.register : t.login;
    }

    async function submitAuthForm() {
        const email = document.getElementById('emailInput').value;
        const password = document.getElementById('passwordInput').value;
        const name = document.getElementById('nameInput').value;

        if (isSupabaseEnabled) {
            if (authMode === 'register') {
                const { error } = await supabase.auth.signUp({ email, password, options: { data: { full_name: name } } });
                if (error) alert(error.message); else alert("Sucesso! Verifique seu e-mail.");
            } else {
                const { data, error } = await supabase.auth.signInWithPassword({ email, password });
                if (error) alert(error.message); else {
                    sessionUser = { id: data.user.id, name: data.user.user_metadata.full_name };
                    enterApp();
                }
            }
        } else {
            alert("Modo Demo: Conexão indisponível.");
        }
    }

    function enterApp() {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('calendarScreen').style.display = 'flex';
        document.getElementById('appHeader').style.display = 'flex';
    }

    function logout() { location.reload(); }
    function adjustMonth(n) { focusDate.setMonth(focusDate.getMonth() + n); renderCalendar(); }
    
    async function renderCalendar() {
        // Lógica simples de renderização
        document.getElementById('monthLabel').innerText = `${focusDate.getMonth()+1}月`;
    }
    
    function toggleMyUnavailability() {}
    function closeDetailModal() { document.getElementById('detailModal').classList.remove('active'); }
    function showDeleteConfirm() {}

</script>
</body>
</html>

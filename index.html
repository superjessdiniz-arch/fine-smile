<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ファインスマイル 予定登録</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { margin: 0; background-color: #f2f2f7; font-family: -apple-system, sans-serif; display: flex; justify-content: center; min-height: 100vh; padding: 20px; }
        .app-container { width: 100%; max-width: 400px; }
        .header { text-align: center; font-size: 1.5rem; font-weight: bold; margin-bottom: 20px; }
        
        /* Input de Nome */
        .name-input { width: 100%; padding: 15px; margin-bottom: 20px; border: 1px solid #e5e5ea; border-radius: 12px; font-size: 1rem; box-sizing: border-box; }
        
        .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; background: white; padding: 15px; border-radius: 16px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .day { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; background: #f2f2f7; border-radius: 8px; font-size: 0.9rem; cursor: pointer; }
        .day:active { background: #d1d1d6; }
        .header-day { font-weight: bold; color: #8e8e93; background: none; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="header">ファインスマイル</div>
    
    <!-- Campo para o nome -->
    <input type="text" id="userName" class="name-input" placeholder="お名前を入力してください">
    
    <div class="calendar" id="calendar">
        <div class="day header-day">日</div><div class="day header-day">月</div>
        <div class="day header-day">火</div><div class="day header-day">水</div>
        <div class="day header-day">木</div><div class="day header-day">金</div>
        <div class="day header-day">土</div>
        
        <script>
            for(let i = 1; i <= 31; i++) {
                document.write(`<div class="day" onclick="markDate(${i})">${i}</div>`);
            }
        </script>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://xzgctiomfdhbmadmqvtm.supabase.co"; 
    const SUPABASE_ANON_KEY = "sb_publishable_5T2YaTeA1jhv_ofatSeSwQ_xq6tAqsI";
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function markDate(day) {
        const name = document.getElementById('userName').value;
        
        if (!name) {
            alert("お名前を入力してください！");
            return;
        }

        // Tenta salvar na tabela 'availabilities'
        const { error } = await supabase
            .from('availabilities')
            .insert([{ name: name, date: `2026-07-${day.toString().padStart(2, '0')}` }]);

        if (error) {
            alert("エラー: " + error.message);
        } else {
            alert(`${day}日を登録しました。`);
        }
    }
</script>

</body>
</html>
